<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HADES</title>
    <link rel="icon" type="image/png" href="./chatgpt-bridge-extension/hades-cover.png" />
    <link rel="shortcut icon" href="./chatgpt-bridge-extension/hades-cover.png" />
    <link rel="apple-touch-icon" href="./chatgpt-bridge-extension/hades-cover.png" />
    <meta name="application-name" content="HADES" />
    <meta name="apple-mobile-web-app-title" content="HADES" />
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background:
                radial-gradient(circle at top right, rgba(128, 243, 211, 0.18), transparent 32%),
                linear-gradient(180deg, #0a1320, #121d2e 55%, #0f1827);
            color: #eef6ff;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            display: grid;
            place-items: center;
        }

        .shell {
            display: grid;
            justify-items: center;
            gap: 14px;
            text-align: center;
        }

        .shell img {
            width: 92px;
            height: 92px;
            border-radius: 22px;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
        }

        .shell strong {
            font-size: 28px;
            letter-spacing: 0.08em;
        }

        .shell p {
            margin: 0;
            font-size: 14px;
            color: rgba(238, 246, 255, 0.78);
        }
    </style>
</head>
<body>
    <main class="shell" aria-live="polite">
        <img src="./chatgpt-bridge-extension/hades-cover.png" alt="HADES" />
        <strong>HADES</strong>
        <p>Oturum hazırlanıyor...</p>
    </main>
    <script>
        (() => {
            const params = new URLSearchParams(window.location.search);
            const target = String(params.get('target') || 'https://chatgpt.com/').trim();
            window.setTimeout(() => {
                window.location.replace(target);
            }, 60);
        })();
    </script>
</body>
</html>
